name: Radar Loker Harian

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Code dari Repo
      uses: actions/checkout@v4 # 🔥 UPDATE: dari v3 jadi v4

    - name: Setup Python
      uses: actions/setup-python@v5 # 🔥 UPDATE: dari v4 jadi v5
      with:
        python-version: '3.10'

    - name: Install Library
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Eksekusi Pencarian Loker 🚀
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python scraper_loker.py