name: Radar Loker Harian

on:
  schedule:
    # GitHub pake waktu UTC. Jam 8 pagi WIB = Jam 1 pagi UTC.
    - cron: '0 1 * * *' 
  workflow_dispatch: # Ini biar lo bisa klik 'Run' manual buat ngetes

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Code dari Repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Sesuaikan kalau lo pake versi lain

    - name: Install Library
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Eksekusi Pencarian Loker 🚀
      env:
        # Ini narik kunci yang tadi lo simpen di brankas (Secrets)
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python scraper_loker.py
